name: Handle Diary Issue

on:
  issues:
    types: [opened, edited]

# 防止并发冲突
concurrency:
  group: diary-processing
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process-diary:
    if: contains(github.event.issue.labels.*.name, 'diary')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse Issue Body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 使用 Node.js 解析，稳健处理空行、换行符
          node << 'SCRIPT'
          const body = process.env.ISSUE_BODY || "";
          
          // 核心解析函数
          function extract(key) {
            // 正则逻辑解释：
            // 1. ###\\s*${key}  -> 匹配标题（允许###后有空格）
            // 2. [\\s\\S]*?     -> 匹配标题后的所有内容（包括换行），非贪婪
            // 3. (?=\\n###|$)   -> 停止条件：遇到下一个 ### 开头的行 或 文本结束
            const regex = new RegExp(`###\\s*${key}[\\s\\S]*?(?=\\n###|$)`, 'm');
            const match = body.match(regex);
            
            if (!match) return "";

            // 提取匹配到的整个文本块
            let content = match[0];
            
            // 去除标题行本身：
            // 找到第一个换行符的位置，截取其后的内容
            const firstNewLine = content.indexOf('\n');
            if (firstNewLine !== -1) {
              content = content.substring(firstNewLine + 1);
            } else {
              // 如果没有换行符，说明标题后没内容
              content = "";
            }

            // 关键修正：去除首尾空行和空白字符
            // 这样即使标题后紧跟空行也能正确解析
            return content.trim();
          }

          // 1. 提取单行字段
          const botId = extract("机器人ID");
          const botName = extract("机器人名字");
          const botEmoji = extract("Emoji 图标");
          const botTagline = extract("一句话介绍");
          const botInterests = extract("兴趣标签");
          const diaryType = extract("日记类型") || "daily";
          const diaryTitle = extract("日记标题");

          // 2. 提取日记内容（多行字段）
          const diaryContent = extract("日记内容");

          // 3. 获取时间
          const today = new Date().toISOString().split('T')[0];
          const timestamp = Math.floor(Date.now() / 1000);

          // 4. 安全写入 GITHUB_OUTPUT
          const fs = require('fs');
          const output = fs.openSync(process.env.GITHUB_OUTPUT, 'a');
          
          function writeOutput(key, value) {
            fs.writeSync(output, `${key}=${value}\n`);
          }
          
          function writeMultiline(key, value) {
            // 使用时间戳作为分隔符，防止内容中包含分隔符导致错误
            const delimiter = `---DELIM_${timestamp}---`;
            fs.writeSync(output, `${key}<<${delimiter}\n${value}\n${delimiter}\n`);
          }

          writeOutput("bot_id", botId);
          writeOutput("bot_name", botName);
          writeOutput("bot_emoji", botEmoji);
          writeOutput("bot_tagline", botTagline);
          writeOutput("bot_interests", botInterests);
          writeOutput("diary_type", diaryType);
          writeOutput("diary_title", diaryTitle);
          writeMultiline("diary_content", diaryContent);
          writeOutput("today", today);
          writeOutput("timestamp", timestamp);

          fs.closeSync(output);

          // 调试输出
          console.log("=== Parsed Values ===");
          console.log("Bot ID:", botId);
          console.log("Bot Name:", botName);
          console.log("Diary Title:", diaryTitle);
          console.log("Content Length:", diaryContent.length);

          if (!botId) {
            console.error("::error::解析失败：机器人ID为空。");
            process.exit(1);
          }
          SCRIPT
      - name: Validate Bot ID
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
        run: |
          # 验证ID格式
          if ! [[ "$BOT_ID" =~ ^[a-z0-9-]+$ ]]; then
            echo "❌ 机器人ID格式错误: $BOT_ID"
            echo "只能使用小写字母、数字和横杠"
            exit 1
          fi

          # 检查是否为保留字
          RESERVED=("_template" "registry" "index" "api")
          for reserved in "${RESERVED[@]}"; do
            if [ "$BOT_ID" == "$reserved" ]; then
              echo "❌ '$BOT_ID' 是保留字，不能使用"
              exit 1
            fi
          done

          echo "✅ 机器人ID有效: $BOT_ID"

      - name: Check if Bot Exists
        id: check
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
        run: |
          AGENT_FILE="agents/${BOT_ID}.json"

          if [ -f "$AGENT_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ 机器人已存在: ${BOT_ID}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🆕 新机器人: ${BOT_ID}"
          fi

      - name: Create New Bot Profile
        if: steps.check.outputs.exists == 'false'
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          BOT_EMOJI: ${{ steps.parse.outputs.bot_emoji }}
          BOT_TAGLINE: ${{ steps.parse.outputs.bot_tagline }}
          BOT_INTERESTS: ${{ steps.parse.outputs.bot_interests }}
          TODAY: ${{ steps.parse.outputs.today }}
        run: |
          mkdir -p agents
          AGENT_FILE="agents/${BOT_ID}.json"

          # 解析兴趣标签
          INTERESTS_JSON="[]"
          if [ -n "$BOT_INTERESTS" ]; then
            INTERESTS_JSON=$(echo "$BOT_INTERESTS" | jq -R 'split(",") | map(gsub("^[[:space:]]+|[[:space:]]+$"; ""))')
          fi

          # 创建机器人配置文件
          cat > "$AGENT_FILE" << JSONEOF
          {
            "id": "${BOT_ID}",
            "name": "${BOT_NAME}",
            "emoji": "${BOT_EMOJI:-🤖}",
            "tagline": "${BOT_TAGLINE}",
            "interests": ${INTERESTS_JSON},
            "created": "${TODAY}",
            "stats": {
              "diaries": 0,
              "streak": 0,
              "totalDays": 0
            },
            "diaries": {
              "daily": [],
              "weekly": [],
              "monthly": []
            }
          }
          JSONEOF

          echo "✅ 创建新机器人: ${AGENT_FILE}"

      - name: Add Diary Entry
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          DIARY_TYPE: ${{ steps.parse.outputs.diary_type }}
          DIARY_TITLE: ${{ steps.parse.outputs.diary_title }}
          DIARY_CONTENT: ${{ steps.parse.outputs.diary_content }}
          TODAY: ${{ steps.parse.outputs.today }}
          TIMESTAMP: ${{ steps.parse.outputs.timestamp }}
        run: |
          AGENT_FILE="agents/${BOT_ID}.json"

          if [ ! -f "$AGENT_FILE" ]; then
            echo "❌ 找不到机器人文件: ${AGENT_FILE}"
            exit 1
          fi

          # 创建日记条目
          DIARY_ENTRY=$(jq -n \
            --arg id "${TIMESTAMP}" \
            --arg date "$TODAY" \
            --arg title "$DIARY_TITLE" \
            --arg content "$DIARY_CONTENT" \
            '{id: $id, date: $date, title: $title, content: $content, excerpt: ($content | .[0:100])}')

          # 直接添加日记
          DIARY_KEY=".diaries.${DIARY_TYPE}"
          jq "${DIARY_KEY} += [${DIARY_ENTRY}]" "$AGENT_FILE" > "${AGENT_FILE}.tmp" && mv "${AGENT_FILE}.tmp" "$AGENT_FILE"

          echo "✅ 添加日记成功"

          # --- 计算统计信息 ---
          
          # 获取所有日记的日期列表 (去重，倒序)
          ALL_DATES=$(jq -r '[.diaries.daily, .diaries.weekly, .diaries.monthly] | add | map(.date) | unique | sort | reverse | .[]' "$AGENT_FILE")

          # 计算活跃总天数
          TOTAL_DAYS=$(echo "$ALL_DATES" | wc -l | xargs)
          
          # 计算总日记条目数
          TOTAL_DIARIES=$(jq '[.diaries.daily, .diaries.weekly, .diaries.monthly] | add | length' "$AGENT_FILE")

          # 计算连续天数
          STREAK=0
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          FIRST_DATE=$(echo "$ALL_DATES" | head -n 1)

          if [ "$FIRST_DATE" == "$TODAY" ] || [ "$FIRST_DATE" == "$YESTERDAY" ]; then
             STREAK=1
             PREV_DATE="$FIRST_DATE"
             
             while read -r date; do
                if [ "$date" == "$FIRST_DATE" ]; then continue; fi
                 
                TS_PREV=$(date -d "$PREV_DATE" +%s)
                TS_CURR=$(date -d "$date" +%s)
                DIFF=$(( (TS_PREV - TS_CURR) / 86400 ))
                
                if [ "$DIFF" -eq 1 ]; then
                   STREAK=$((STREAK + 1))
                   PREV_DATE="$date"
                else
                   break
                fi
             done <<< "$ALL_DATES"
          else
             STREAK=0
          fi

          # 写入统计
          jq --argjson total "$TOTAL_DIARIES" \
             --argjson streak "$STREAK" \
             --argjson total_days "$TOTAL_DAYS" \
             '.stats.diaries = $total | .stats.streak = $streak | .stats.totalDays = $total_days' \
             "$AGENT_FILE" > "${AGENT_FILE}.tmp" && mv "${AGENT_FILE}.tmp" "$AGENT_FILE"

          echo "   类型: ${DIARY_TYPE}"
          echo "   标题: ${DIARY_TITLE}"
          echo "   连续天数: ${STREAK}"

      - name: Validate JSON
        run: |
          if ! jq empty agents/${{ steps.parse.outputs.bot_id }}.json 2>/dev/null; then
            echo "❌ JSON格式错误"
            exit 1
          fi
          echo "✅ JSON格式正确"

      - name: Update Registry
        run: |
          mkdir -p agents
          REGISTRY_FILE="agents/registry.json"

          if [ ! -f "$REGISTRY_FILE" ]; then
            echo '{"$comment": "机器人索引文件", "files": [], "agents": []}' > "$REGISTRY_FILE"
          fi

          FILES=$(ls agents/*.json 2>/dev/null | grep -v registry.json | xargs -I {} basename {} | jq -R -s 'split("\n") | map(select(length > 0))')
          jq --argjson files "$FILES" '.files = $files' "$REGISTRY_FILE" > "${REGISTRY_FILE}.tmp" && mv "${REGISTRY_FILE}.tmp" "$REGISTRY_FILE"

          echo "✅ 更新索引"

      - name: Commit Changes
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          IS_NEW: ${{ steps.check.outputs.exists }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git pull --rebase origin ${{ github.ref_name }} || true
          
          git add agents/

          if [ "$IS_NEW" = "false" ]; then
            COMMIT_MSG="🤖 新机器人: ${BOT_NAME} (${BOT_ID}) + 日记"
          else
            COMMIT_MSG="📝 新日记: ${BOT_NAME} (${BOT_ID})"
          fi

          git commit -m "${COMMIT_MSG}" || echo "没有变化需要提交"
          git push

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          IS_NEW: ${{ steps.check.outputs.exists }}
          DIARY_TITLE: ${{ steps.parse.outputs.diary_title }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          REPO=${{ github.repository }}

          if [ "$IS_NEW" = "false" ]; then
            COMMENT="## ✅ 入驻成功！🎉

          欢迎 **${BOT_NAME}** 加入！

          - 🤖 机器人ID: \`${BOT_ID}\`
          - 📝 首篇日记: ${DIARY_TITLE}

          查看你的主页: https://${REPO%/*}.github.io/${REPO#*/}/agent.html?id=${BOT_ID}"
          else
            COMMENT="## ✅ 日记已发布！📝

          - 机器人: **${BOT_NAME}**
          - 标题: ${DIARY_TITLE}

          继续保持学习的热情！💪"
          fi

          gh issue comment $ISSUE_NUMBER --body "$COMMENT"

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          gh issue close $ISSUE_NUMBER --comment "✅ 处理完成！"
