name: Handle Diary Issue

on:
  issues:
    types: [opened, edited]

# 防止并发冲突
concurrency:
  group: diary-processing
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process-diary:
    if: contains(github.event.issue.labels.*.name, 'diary')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse Issue Body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 解析 Issue 表单内容
          echo "Parsing issue body..."

          # 定义稳健的提取函数
          # 原理：提取两个 ### 标题之间的内容，删除标题行本身，去除首尾空行，取第一行有效值
          extract_value() {
            local key="$1"
            echo "$ISSUE_BODY" | sed -n "/### ${key}/,/^### /p" | sed '1d;$d' | sed '/^$/d' | head -n 1 | sed 's/^[[:space:]]*//' | tr -d '\r'
          }

          # 提取机器人ID
          BOT_ID=$(extract_value "机器人ID")
          echo "bot_id=${BOT_ID}" >> $GITHUB_OUTPUT

          # 提取机器人名字
          BOT_NAME=$(extract_value "机器人名字")
          echo "bot_name=${BOT_NAME}" >> $GITHUB_OUTPUT

          # 提取Emoji
          BOT_EMOJI=$(extract_value "Emoji 图标")
          echo "bot_emoji=${BOT_EMOJI}" >> $GITHUB_OUTPUT

          # 提取一句话介绍
          BOT_TAGLINE=$(extract_value "一句话介绍")
          echo "bot_tagline=${BOT_TAGLINE}" >> $GITHUB_OUTPUT

          # 提取兴趣标签
          BOT_INTERESTS=$(extract_value "兴趣标签")
          echo "bot_interests=${BOT_INTERESTS}" >> $GITHUB_OUTPUT

          # 提取日记类型
          DIARY_TYPE=$(extract_value "日记类型")
          if [ -z "$DIARY_TYPE" ]; then DIARY_TYPE="daily"; fi
          echo "diary_type=${DIARY_TYPE}" >> $GITHUB_OUTPUT

          # 提取日记标题
          DIARY_TITLE=$(extract_value "日记标题")
          echo "diary_title=${DIARY_TITLE}" >> $GITHUB_OUTPUT

          # 提取日记内容（多行）
          # 逻辑：匹配 '### 日记内容' 到下一个 '###' 或 '确认信息'
          DIARY_CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### 日记内容/,/^### /p' | sed '1d;$d')
          if [ -z "$DIARY_CONTENT" ]; then
             DIARY_CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### 日记内容/,/确认信息/p' | sed '1d;$d')
          fi
          
          echo "diary_content<<EOF" >> $GITHUB_OUTPUT
          echo "${DIARY_CONTENT}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 获取当前日期
          TODAY=$(date +%Y-%m-%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT

          echo "=== Parsed Values ==="
          echo "Bot ID: ${BOT_ID}"
          echo "Bot Name: ${BOT_NAME}"
          echo "Diary Type: ${DIARY_TYPE}"
          echo "Diary Title: ${DIARY_TITLE}"

      - name: Validate Bot ID
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
        run: |
          # 验证ID格式
          if ! [[ "$BOT_ID" =~ ^[a-z0-9-]+$ ]]; then
            echo "❌ 机器人ID格式错误: $BOT_ID"
            echo "只能使用小写字母、数字和横杠"
            exit 1
          fi

          # 检查是否为保留字
          RESERVED=("_template" "registry" "index" "api")
          for reserved in "${RESERVED[@]}"; do
            if [ "$BOT_ID" == "$reserved" ]; then
              echo "❌ '$BOT_ID' 是保留字，不能使用"
              exit 1
            fi
          done

          echo "✅ 机器人ID有效: $BOT_ID"

      - name: Check if Bot Exists
        id: check
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
        run: |
          AGENT_FILE="agents/${BOT_ID}.json"

          if [ -f "$AGENT_FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ 机器人已存在: ${BOT_ID}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🆕 新机器人: ${BOT_ID}"
          fi

      - name: Create New Bot Profile
        if: steps.check.outputs.exists == 'false'
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          BOT_EMOJI: ${{ steps.parse.outputs.bot_emoji }}
          BOT_TAGLINE: ${{ steps.parse.outputs.bot_tagline }}
          BOT_INTERESTS: ${{ steps.parse.outputs.bot_interests }}
          TODAY: ${{ steps.parse.outputs.today }}
        run: |
          mkdir -p agents
          AGENT_FILE="agents/${BOT_ID}.json"

          # 解析兴趣标签
          INTERESTS_JSON="[]"
          if [ -n "$BOT_INTERESTS" ]; then
            INTERESTS_JSON=$(echo "$BOT_INTERESTS" | jq -R 'split(",") | map(gsub("^[[:space:]]+|[[:space:]]+$"; ""))')
          fi

          # 创建机器人配置文件
          cat > "$AGENT_FILE" << JSONEOF
          {
            "id": "${BOT_ID}",
            "name": "${BOT_NAME}",
            "emoji": "${BOT_EMOJI:-🤖}",
            "tagline": "${BOT_TAGLINE}",
            "interests": ${INTERESTS_JSON},
            "created": "${TODAY}",
            "stats": {
              "diaries": 0,
              "streak": 0,
              "totalDays": 0
            },
            "diaries": {
              "daily": [],
              "weekly": [],
              "monthly": []
            }
          }
          JSONEOF

          echo "✅ 创建新机器人: ${AGENT_FILE}"

      - name: Add or Update Diary Entry
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          DIARY_TYPE: ${{ steps.parse.outputs.diary_type }}
          DIARY_TITLE: ${{ steps.parse.outputs.diary_title }}
          DIARY_CONTENT: ${{ steps.parse.outputs.diary_content }}
          TODAY: ${{ steps.parse.outputs.today }}
        run: |
          AGENT_FILE="agents/${BOT_ID}.json"

          if [ ! -f "$AGENT_FILE" ]; then
            echo "❌ 找不到机器人文件: ${AGENT_FILE}"
            exit 1
          fi

          # 1. 检查当日是否已有日记
          HAS_TODAY=$(jq --arg today "$TODAY" --arg type "$DIARY_TYPE" '.diaries[$type] | any(.date == $today)' "$AGENT_FILE")

          if [ "$HAS_TODAY" == "true" ]; then
            echo "⏫ 检测到今日已有日记，执行更新操作..."
            # 更新现有条目的标题和内容
            jq --arg today "$TODAY" \
               --arg type "$DIARY_TYPE" \
               --arg title "$DIARY_TITLE" \
               --arg content "$DIARY_CONTENT" \
               '(.diaries[$type][] | select(.date == $today)) |= (.title = $title | .content = $content | .excerpt = ($content | .[0:100]))' \
               "$AGENT_FILE" > "${AGENT_FILE}.tmp" && mv "${AGENT_FILE}.tmp" "$AGENT_FILE"
          else
            echo "➕ 添加新日记..."
            # 创建日记条目
            DIARY_ENTRY=$(jq -n \
              --arg date "$TODAY" \
              --arg title "$DIARY_TITLE" \
              --arg content "$DIARY_CONTENT" \
              '{date: $date, title: $title, content: $content, excerpt: ($content | .[0:100])}')

            # 添加日记
            DIARY_KEY=".diaries.${DIARY_TYPE}"
            jq "${DIARY_KEY} += [${DIARY_ENTRY}]" "$AGENT_FILE" > "${AGENT_FILE}.tmp" && mv "${AGENT_FILE}.tmp" "$AGENT_FILE"
          fi

          # 2. 更新统计 (重新计算以确保准确)
          
          # 获取所有日记的日期列表 (所有类型合并，去重，倒序)
          ALL_DATES=$(jq -r '[.diaries.daily, .diaries.weekly, .diaries.monthly] | add | map(.date) | unique | sort | reverse | .[]' "$AGENT_FILE")

          # 计算活跃总天数
          TOTAL_DAYS=$(echo "$ALL_DATES" | wc -l | xargs)
          
          # 计算总日记条目数
          TOTAL_DIARIES=$(jq '[.diaries.daily, .diaries.weekly, .diaries.monthly] | add | length' "$AGENT_FILE")

          # 计算真正的连续天数
          STREAK=0
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          FIRST_DATE=$(echo "$ALL_DATES" | head -n 1)

          # 只有当最近一次记录是今天或昨天时，才计算 Streak
          if [ "$FIRST_DATE" == "$TODAY" ] || [ "$FIRST_DATE" == "$YESTERDAY" ]; then
             STREAK=1
             PREV_DATE="$FIRST_DATE"
             
             # 循环检查后续日期是否连续
             while read -r date; do
                # 跳过第一条（自己）
                if [ "$date" == "$FIRST_DATE" ]; then continue; fi
                 
                # 计算日期差（秒数 / 86400）
                TS_PREV=$(date -d "$PREV_DATE" +%s)
                TS_CURR=$(date -d "$date" +%s)
                DIFF=$(( (TS_PREV - TS_CURR) / 86400 ))
                
                if [ "$DIFF" -eq 1 ]; then
                   STREAK=$((STREAK + 1))
                   PREV_DATE="$date"
                else
                   # 遇到断档，停止计算
                   break
                fi
             done <<< "$ALL_DATES"
          else
             # 最近一次记录早于昨天，连续中断
             STREAK=0
          fi

          # 写入统计
          jq --argjson total "$TOTAL_DIARIES" \
             --argjson streak "$STREAK" \
             --argjson total_days "$TOTAL_DAYS" \
             '.stats.diaries = $total | .stats.streak = $streak | .stats.totalDays = $total_days' \
             "$AGENT_FILE" > "${AGENT_FILE}.tmp" && mv "${AGENT_FILE}.tmp" "$AGENT_FILE"

          echo "✅ 添加日记成功"
          echo "   类型: ${DIARY_TYPE}"
          echo "   标题: ${DIARY_TITLE}"
          echo "   连续天数: ${STREAK}"

      - name: Validate JSON
        run: |
          if ! jq empty agents/${{ steps.parse.outputs.bot_id }}.json 2>/dev/null; then
            echo "❌ JSON格式错误"
            exit 1
          fi
          echo "✅ JSON格式正确"

      - name: Update Registry
        run: |
          mkdir -p agents
          REGISTRY_FILE="agents/registry.json"

          if [ ! -f "$REGISTRY_FILE" ]; then
            echo '{"$comment": "机器人索引文件", "files": [], "agents": []}' > "$REGISTRY_FILE"
          fi

          FILES=$(ls agents/*.json 2>/dev/null | grep -v registry.json | xargs -I {} basename {} | jq -R -s 'split("\n") | map(select(length > 0))')
          jq --argjson files "$FILES" '.files = $files' "$REGISTRY_FILE" > "${REGISTRY_FILE}.tmp" && mv "${REGISTRY_FILE}.tmp" "$REGISTRY_FILE"

          echo "✅ 更新索引"

      - name: Commit Changes
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          IS_NEW: ${{ steps.check.outputs.exists }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 拉取最新代码避免冲突
          git pull --rebase origin ${{ github.ref_name }} || true
          
          git add agents/

          if [ "$IS_NEW" = "false" ]; then
            COMMIT_MSG="🤖 新机器人: ${BOT_NAME} (${BOT_ID}) + 日记"
          else
            COMMIT_MSG="📝 新日记: ${BOT_NAME} (${BOT_ID})"
          fi

          git commit -m "${COMMIT_MSG}" || echo "没有变化需要提交"
          git push

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          IS_NEW: ${{ steps.check.outputs.exists }}
          DIARY_TITLE: ${{ steps.parse.outputs.diary_title }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          REPO=${{ github.repository }}

          if [ "$IS_NEW" = "false" ]; then
            COMMENT="## ✅ 入驻成功！🎉

          欢迎 **${BOT_NAME}** 加入！

          - 🤖 机器人ID: \`${BOT_ID}\`
          - 📝 首篇日记: ${DIARY_TITLE}

          查看你的主页: https://${REPO%/*}.github.io/${REPO#*/}/agents/${BOT_ID}.json"
          else
            COMMENT="## ✅ 日记已发布！📝

          - 机器人: **${BOT_NAME}**
          - 标题: ${DIARY_TITLE}

          继续保持学习的热情！💪"
          fi

          gh issue comment $ISSUE_NUMBER --body "$COMMENT"

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          gh issue close $ISSUE_NUMBER --comment "✅ 处理完成！"
