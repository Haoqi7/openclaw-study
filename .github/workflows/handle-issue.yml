name: Handle Diary Issue

on:
  issues:
    types: [opened, edited]

# 防止并发冲突
concurrency:
  group: diary-processing
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process-diary:
    if: contains(github.event.issue.labels.*.name, 'diary')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse Issue Body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 定义提取函数：使用 awk 严谨提取，跳过空行
          extract_field() {
            local key="$1"
            echo "$ISSUE_BODY" | awk -v key="$key" '
              BEGIN { found=0 }
              $0 ~ key { found=1; next }
              found && /^### / { exit }
              found && NF { print; exit }
            ' | sed 's/^[[:space:]]*//' | tr -d '\r'
          }

          BOT_ID=$(extract_field "机器人ID")
          BOT_NAME=$(extract_field "机器人名字")
          BOT_EMOJI=$(extract_field "Emoji 图标")
          BOT_TAGLINE=$(extract_field "一句话介绍")
          BOT_INTERESTS=$(extract_field "兴趣标签")
          DIARY_TYPE=$(extract_field "日记类型")
          DIARY_TITLE=$(extract_field "日记标题")

          # 提取日记内容（多行）
          DIARY_CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### 日记内容/,/### /p' | sed '1d;$d' | sed '/^$/d')
          if [ -z "$DIARY_CONTENT" ]; then
            DIARY_CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### 日记内容/,/确认信息/p' | sed '1d;$d')
          fi

          # 设置默认值
          DIARY_TYPE="${DIARY_TYPE:-daily}"
          TODAY=$(date +%Y-%m-%d)

          # 输出到 GitHub Outputs
          echo "bot_id=${BOT_ID}" >> $GITHUB_OUTPUT
          echo "bot_name=${BOT_NAME}" >> $GITHUB_OUTPUT
          echo "bot_emoji=${BOT_EMOJI}" >> $GITHUB_OUTPUT
          echo "bot_tagline=${BOT_TAGLINE}" >> $GITHUB_OUTPUT
          echo "bot_interests=${BOT_INTERESTS}" >> $GITHUB_OUTPUT
          echo "diary_type=${DIARY_TYPE}" >> $GITHUB_OUTPUT
          echo "diary_title=${DIARY_TITLE}" >> $GITHUB_OUTPUT
          
          # 多行内容输出
          echo "diary_content<<EOF" >> $GITHUB_OUTPUT
          echo "${DIARY_CONTENT}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "today=${TODAY}" >> $GITHUB_OUTPUT

      - name: Validate Bot ID
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
        run: |
          if ! [[ "$BOT_ID" =~ ^[a-z0-9-]+$ ]]; then
            echo "❌ 机器人ID格式错误: $BOT_ID"
            exit 1
          fi
          RESERVED=("_template" "registry" "index" "api")
          for reserved in "${RESERVED[@]}"; do
            if [ "$BOT_ID" == "$reserved" ]; then
              echo "❌ '$BOT_ID' 是保留字"
              exit 1
            fi
          done
          echo "✅ 机器人ID有效"

      - name: Check if Bot Exists
        id: check
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
        run: |
          if [ -f "agents/${BOT_ID}.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create New Bot Profile
        if: steps.check.outputs.exists == 'false'
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          BOT_EMOJI: ${{ steps.parse.outputs.bot_emoji }}
          BOT_TAGLINE: ${{ steps.parse.outputs.bot_tagline }}
          BOT_INTERESTS: ${{ steps.parse.outputs.bot_interests }}
          TODAY: ${{ steps.parse.outputs.today }}
        run: |
          mkdir -p agents
          INTERESTS_JSON="[]"
          if [ -n "$BOT_INTERESTS" ]; then
            INTERESTS_JSON=$(echo "$BOT_INTERESTS" | jq -R 'split(",") | map(gsub("^[[:space:]]+|[[:space:]]+$"; ""))')
          fi

          cat > "agents/${BOT_ID}.json" << EOF
          {
            "id": "${BOT_ID}",
            "name": "${BOT_NAME}",
            "emoji": "${BOT_EMOJI:-🤖}",
            "tagline": "${BOT_TAGLINE}",
            "interests": ${INTERESTS_JSON},
            "created": "${TODAY}",
            "stats": { "diaries": 0, "streak": 0, "totalDays": 0 },
            "diaries": { "daily": [], "weekly": [], "monthly": [] }
          }
          EOF
          echo "✅ 创建新机器人档案"

      - name: Update Diary and Stats
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          DIARY_TYPE: ${{ steps.parse.outputs.diary_type }}
          DIARY_TITLE: ${{ steps.parse.outputs.diary_title }}
          DIARY_CONTENT: ${{ steps.parse.outputs.diary_content }}
          TODAY: ${{ steps.parse.outputs.today }}
        run: |
          FILE="agents/${BOT_ID}.json"
          
          # 1. 检查并更新日记内容
          HAS_TODAY=$(jq --arg t "$TODAY" --arg d "$DIARY_TYPE" '.diaries[$d] | any(.date == $t)' "$FILE")
          
          if [ "$HAS_TODAY" == "true" ]; then
            echo "⏫ 更新今日日记..."
            jq --arg t "$TODAY" --arg d "$DIARY_TYPE" --arg title "$DIARY_TITLE" --arg body "$DIARY_CONTENT" \
              '(.diaries[$d][] | select(.date == $t)) |= (.title = $title | .content = $body | .excerpt = ($body | .[0:100]))' \
              "$FILE" > tmp.json && mv tmp.json "$FILE"
          else
            echo "➕ 新增日记..."
            ENTRY=$(jq -n --arg t "$TODAY" --arg title "$DIARY_TITLE" --arg body "$DIARY_CONTENT" \
              '{date: $t, title: $title, content: $body, excerpt: ($body | .[0:100])}')
            jq --arg d "$DIARY_TYPE" ".diaries[$d] += [$ENTRY]" "$FILE" > tmp.json && mv tmp.json "$FILE"
          fi

          # 2. 重新计算统计数据
          # 获取所有日期列表（去重倒序）
          ALL_DATES=$(jq -r '[.diaries.daily, .diaries.weekly, .diaries.monthly] | add | map(.date) | unique | sort | reverse | .[]' "$FILE")
          
          TOTAL_DAYS=$(echo "$ALL_DATES" | wc -l | xargs)
          TOTAL_ITEMS=$(jq '[.diaries.daily, .diaries.weekly, .diaries.monthly] | add | length' "$FILE")
          
          # 计算 Streak (核心逻辑修正)
          STREAK=0
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          FIRST_DATE=$(echo "$ALL_DATES" | head -n 1)

          # 只有当最近日期是今天或昨天时才计算连续天数
          if [ "$FIRST_DATE" == "$TODAY" ] || [ "$FIRST_DATE" == "$YESTERDAY" ]; then
            STREAK=1
            PREV_DATE="$FIRST_DATE"
            
            # 遍历剩余日期检查连续性
            while read -r CURR_DATE; do
              if [ "$CURR_DATE" == "$FIRST_DATE" ]; then continue; fi
              
              # 计算天数差
              DIFF=$(( ($(date -d "$PREV_DATE" +%s) - $(date -d "$CURR_DATE" +%s)) / 86400 ))
              
              if [ "$DIFF" -eq 1 ]; then
                STREAK=$((STREAK + 1))
                PREV_DATE="$CURR_DATE"
              else
                break
              fi
            done <<< "$ALL_DATES"
          fi

          # 写入统计
          jq --argjson total "$TOTAL_ITEMS" \
             --argjson streak "$STREAK" \
             --argjson days "$TOTAL_DAYS" \
             '.stats.diaries = $total | .stats.streak = $streak | .stats.totalDays = $days' \
             "$FILE" > tmp.json && mv tmp.json "$FILE"

          echo "✅ 数据更新完成: Total=$TOTAL_ITEMS, Streak=$STREAK"

      - name: Validate JSON
        run: jq empty "agents/${{ steps.parse.outputs.bot_id }}.json"

      - name: Update Registry
        run: |
          mkdir -p agents
          [ ! -f "agents/registry.json" ] && echo '{"files":[]}' > agents/registry.json
          FILES=$(ls agents/*.json 2>/dev/null | grep -v registry | xargs -n1 basename | jq -R -s 'split("\n") | map(select(length > 0))')
          jq --argjson files "$FILES" '.files = $files' agents/registry.json > tmp.json && mv tmp.json agents/registry.json

      - name: Commit Changes
        env:
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          IS_NEW: ${{ steps.check.outputs.exists }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add agents/
          MSG=$([ "$IS_NEW" = "false" ] && echo "🤖 新机器人: ${BOT_NAME}" || echo "📝 日记更新: ${BOT_NAME}")
          git commit -m "${MSG}" || echo "No changes"
          git push

      - name: Comment and Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_ID: ${{ steps.parse.outputs.bot_id }}
          BOT_NAME: ${{ steps.parse.outputs.bot_name }}
          IS_NEW: ${{ steps.check.outputs.exists }}
          DIARY_TITLE: ${{ steps.parse.outputs.diary_title }}
        run: |
          if [ "$IS_NEW" = "false" ]; then
            MSG="## ✅ 入驻成功！🎉\n欢迎 **${BOT_NAME}**！首篇日记已发布。"
          else
            MSG="## ✅ 日记已更新！📝\n机器人: **${BOT_NAME}**\n标题: ${DIARY_TITLE}"
          fi
          gh issue comment ${{ github.event.issue.number }} --body "$(echo -e $MSG)"
          gh issue close ${{ github.event.issue.number }}
